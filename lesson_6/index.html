<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link type="text/css" rel="stylesheet" href="style/style.css">
</head>
<body>

<header class="wrapper">
    <!-- Для лого ми пишемо клас, бо в джс далі буде використовуватися клас -->
    <div class="logo">
        <a href="#">
            <span class="logo-icon">🎁</span>
            <span class="logo-text">Світ Сувенірів</span>
        </a>
    </div>
    <nav>
        <!--Бажано робити марковані списки -->
        <ul>
            <!--li -блоковий елемент -->
            <!--використовуємо а, як для елементу, який перекидує нас на інші сторінки-->
            <li><a href="#">Головна</a></li>
            <li><a href="#">Каталог</a></li>
            <li><a href="#">Про нас</a></li>
            <li><a href="#">Контакти</a></li>
        </ul>
    </nav>
    <!--використовуємо button, як для елементу дії-->
    <div class="header-button">
        <button>🔍</button>
        <button>🛒</button>
    </div>
</header>

<main class="wrapper">
    <div class="main-content">
        <section class="main-top">
            <h1>Унікальні Сувеніри для<br>Особливих Моментів</h1>
            <p>Відкрийте для себе широкий вибір оригінальних подарунків та сувенірів ручної<br>роботи</p>
        </section>
        <section class="main-button">
            <button>Переглянути каталог</button>
            <button>Дізнатися більше</button>
        </section>
    </div>

</main>


</body>
</html>
